name: Benchmark
on:
  push:
    # Every push to main feeds the per-commit dashboard (dev/bench) for
    # between-release regression detection. Every release tag additionally
    # feeds a separate release-only dashboard (release/bench) for a clean
    # release-over-release trend. The data-dir-path is chosen per-ref in
    # the "Store results" step below.
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: write
  deployments: write
# Serialize bench runs so the gh-pages push (force-write of the dashboard's
# data.js) cannot race against itself. This matters most at release time,
# when the main-branch push and the tag push fire within seconds of each
# other — they share this group and run one after the other.
concurrency:
  group: benchmark
  cancel-in-progress: false
jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Pinned to a specific Node 24 patch so V8 updates in newer 24.x
          # patches cannot drift the baseline without an intentional bump
          # here. See supported Node.js release schedule at
          # https://nodejs.org/en/about/releases/
          node-version: 24.16.0
          cache: "pnpm"
      - name: Clean install
        run: pnpm install --frozen-lockfile
      - name: Run benchmarks
        run: pnpm run bench:ci
      - name: Store results
        # Pinned to the v1.22.1 commit SHA. Floating `@v1` would let
        # behavior change underneath us between runs; the SHA is bumped
        # explicitly when we want the new behavior.
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba
        with:
          name: Munkres Benchmarks
          tool: "customSmallerIsBetter"
          output-file-path: benchmark_results/ci.txt
          github-token: ${{ secrets.BENCHMARK_TOKEN }}
          auto-push: true
          # Tag pushes write to a separate release-only dashboard; every
          # other push (main, manual) writes to the per-commit dashboard.
          # The two are independent data.js files under gh-pages, so they
          # render as separate pages:
          #   /dev/bench     — per-commit, regression detection
          #   /release/bench — release-over-release trend
          benchmark-data-dir-path: ${{ startsWith(github.ref, 'refs/tags/') && 'release/bench' || 'dev/bench' }}
          # Cap chart history; older datapoints are still in `data.js` but
          # the rendered chart shows only the most recent 100 entries.
          # (Releases are rare, so this never evicts a release point.)
          max-items-in-chart: 100
          # Alert on a >150% slowdown vs the previous datapoint. On the
          # per-commit dashboard that compares against the prior commit;
          # on the release dashboard, against the prior release.
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: true

      # The benchmark action records each datapoint by commit SHA + message,
      # with no knowledge of the tag. On a tag push, stamp the just-appended
      # release/bench entry with its tag (e.g. "v2.1.0") so the dashboard
      # labels points by release rather than SHA. The release/bench
      # index.html renders `tag || sha`, so this is purely additive — an
      # unstamped point still shows its SHA.
      - name: Label release datapoint by tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.BENCHMARK_TOKEN }}
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          git clone --branch gh-pages --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$work"
          cd "$work"
          node - <<'NODE'
          const fs = require("fs");
          const file = "release/bench/data.js";
          const raw = fs.readFileSync(file, "utf8");
          // Strip the `window.BENCHMARK_DATA = ` assignment wrapper (and any
          // trailing `;`) to recover the JSON the action wrote.
          const data = JSON.parse(raw.replace(/^[^=]*=\s*/, "").replace(/;\s*$/, ""));
          const tag = process.env.RELEASE_TAG;
          const sha = process.env.RELEASE_SHA;
          let changed = 0;
          for (const list of Object.values(data.entries)) {
            for (const e of list) {
              if (e.commit.id === sha && e.tag !== tag) {
                e.tag = tag;
                ++changed;
              }
            }
          }
          if (changed > 0) {
            // Re-emit in the action's exact format (pretty JSON, no trailing
            // semicolon/newline) so the diff is just the added `tag` field.
            fs.writeFileSync(file, "window.BENCHMARK_DATA = " + JSON.stringify(data, null, 2));
          }
          console.log(`tagged ${changed} entry/entries as ${tag}`);
          NODE
          if git diff --quiet; then
            echo "No change (entry already tagged, or not yet present)."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add release/bench/data.js
            git commit -m "Label release datapoint ${RELEASE_SHA} as ${RELEASE_TAG}"
            git push origin gh-pages
          fi
